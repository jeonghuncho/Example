<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artemis II Lobby Gallery</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      overflow: hidden;
    }

    #slideshow-container {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 560px;
      background:
        radial-gradient(circle at top right, rgba(70, 90, 140, 0.22), transparent 28%),
        radial-gradient(circle at bottom left, rgba(120, 120, 120, 0.14), transparent 24%),
        #000;
    }

    #image-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: hidden;
    }

    .slide-img {
      position: absolute;
      max-width: calc(100% - 30px);
      max-height: calc(100% - 30px);
      object-fit: contain;
      opacity: 0;
      transition: opacity 1.4s ease-in-out;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.08));
    }

    .slide-img.active {
      opacity: 1;
    }

    #info-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      padding: 42px 40px;
      background: linear-gradient(180deg, rgba(18,18,22,0.92), rgba(6,6,8,0.96));
      border-left: 1px solid rgba(255,255,255,0.08);
      box-shadow: -12px 0 40px rgba(0,0,0,0.45);
    }

    #info-kicker {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #9bbdff;
    }

    #info-count {
      font-size: 26px;
      font-weight: 700;
      color: rgba(255,255,255,0.86);
    }

    #info-title {
      font-size: 48px;
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: -0.03em;
    }

    #info-desc {
      font-size: 29px;
      line-height: 1.55;
      color: rgba(255,255,255,0.93);
      word-break: keep-all;
    }

    #info-source {
      margin-top: 8px;
      font-size: 19px;
      line-height: 1.55;
      color: rgba(255,255,255,0.58);
    }

    #audio-toggle, #audio-start-btn {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(10,10,14,0.76);
      color: #fff;
      padding: 14px 18px;
      font-size: 18px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    #audio-toggle:hover, #audio-start-btn:hover {
      transform: translateY(-1px);
      background: rgba(30,30,38,0.9);
      border-color: rgba(255,255,255,0.3);
    }

    #audio-toggle {
      position: absolute;
      right: 24px;
      bottom: 24px;
      z-index: 21;
    }

    #audio-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: rgba(0,0,0,0.62);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }

    #audio-overlay.hidden {
      display: none;
    }

    #audio-help {
      font-size: 20px;
      line-height: 1.5;
      color: rgba(255,255,255,0.86);
    }

    @media (max-width: 1500px) {
      #slideshow-container {
        grid-template-columns: minmax(0, 1fr) 500px;
      }
      #info-title { font-size: 42px; }
      #info-desc { font-size: 26px; }
    }

    @media (max-width: 1100px) {
      html, body { overflow: auto; }

      #slideshow-container {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
        grid-template-rows: 58vh auto;
      }

      #info-panel {
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.08);
      }

      #audio-toggle {
        right: 20px;
        bottom: 20px;
      }
    }
  </style>
</head>

    const img1 = document.getElementById('img1');
    const img2 = document.getElementById('img2');
    const infoCount = document.getElementById('info-count');
    const infoTitle = document.getElementById('info-title');
    const infoDesc = document.getElementById('info-desc');
    const bgm = document.getElementById('bgm');
    const audioOverlay = document.getElementById('audio-overlay');
    const audioStartBtn = document.getElementById('audio-start-btn');
    const audioToggle = document.getElementById('audio-toggle');

    let playOrder = [];
    let currentIndex = 0;
    let currentVisibleImg = img1;
    let slideTimer = null;
    let isPaused = false;
    let isTransitioning = false;

    // =========================
    // 오디오 재생 목록
    // =========================
    const playlist = [
      "moon/bgm.mp3",
      "moon/bgm1.mp3",
      "moon/bgm2.mp3"
    ];
    let currentTrackIndex = 0;

    bgm.volume = 0.2;

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function buildPlayOrder() {
      const shuffledRandomImages = [...randomImages];
      shuffleArray(shuffledRandomImages);
      return [...shuffledRandomImages, ...endingImages];
    }

    function updateInfo(item, index) {
      infoCount.textContent = `${index + 1} / ${playOrder.length}`;
      infoTitle.textContent = item.title;
      infoDesc.textContent = item.desc;
    }

    function normalizeIndex(index) {
      const len = playOrder.length;
      return ((index % len) + len) % len;
    }

    function resolveImageSrc(item) {
      return new Promise((resolve, reject) => {
        const candidates = item.files || [];
        let pointer = 0;

        function tryNext() {
          if (pointer >= candidates.length) {
            reject(new Error(`이미지 파일을 찾지 못했습니다: ${item.title}`));
            return;
          }

          const candidate = candidates[pointer++];
          const tester = new Image();

          tester.onload = () => resolve(candidate);
          tester.onerror = () => tryNext();
          tester.src = candidate;
        }

        tryNext();
      });
    }

    function loadImageInto(imgEl, src, alt) {
      return new Promise((resolve, reject) => {
        imgEl.onload = null;
        imgEl.onerror = null;
        imgEl.alt = alt;

        imgEl.onload = () => resolve();
        imgEl.onerror = () => reject(new Error(`이미지 로드 실패: ${src}`));

        // 동일한 src가 반복되어도 안전하게 다시 로드
        imgEl.src = "";
        imgEl.src = src;

        if (imgEl.complete && imgEl.naturalWidth > 0) {
          resolve();
        }
      });
    }

    async function renderIndex(targetIndex) {
      if (isTransitioning || playOrder.length === 0) return false;

      isTransitioning = true;

      let tries = 0;
      let index = normalizeIndex(targetIndex);

      while (tries < playOrder.length) {
        const item = playOrder[index];
        const nextImg = currentVisibleImg === img1 ? img2 : img1;

        try {
          const src = await resolveImageSrc(item);
          await loadImageInto(nextImg, src, item.title);

          currentVisibleImg.classList.remove('active');
          nextImg.classList.add('active');

          currentVisibleImg = nextImg;
          currentIndex = index;
          updateInfo(item, currentIndex);

          isTransitioning = false;
          return true;
        } catch (error) {
          console.warn(error.message);
          index = (index + 1) % playOrder.length;
          tries += 1;
        }
      }

      isTransitioning = false;
      console.error('표시 가능한 이미지가 없습니다.');
      return false;
    }

    async function goNext() {
      if (isTransitioning || playOrder.length === 0) return;

      let nextIndex = currentIndex + 1;

      if (nextIndex >= playOrder.length) {
        playOrder = buildPlayOrder();
        nextIndex = 0;
      }

      await renderIndex(nextIndex);
    }

    async function goPrev() {
      if (isTransitioning || playOrder.length === 0) return;
      await renderIndex(currentIndex - 1);
    }

    function startAutoPlay() {
      stopAutoPlay();
      slideTimer = setInterval(() => {
        if (!isPaused && !isTransitioning) {
          goNext();
        }
      }, 10000);
    }

    function stopAutoPlay() {
      if (slideTimer) {
        clearInterval(slideTimer);
        slideTimer = null;
      }
    }

    // =========================
    // 오디오 제어
    // =========================
    function setTrack(index) {
      currentTrackIndex = index;
      bgm.src = playlist[currentTrackIndex];
      bgm.load();
    }

    async function playTrackAt(index, attempts = 0) {
      if (!playlist.length) return false;

      const safeIndex = ((index % playlist.length) + playlist.length) % playlist.length;
      setTrack(safeIndex);

      try {
        await bgm.play();
        audioOverlay.classList.add('hidden');
        audioToggle.textContent = '음악 끄기';
        return true;
      } catch (error) {
        if (attempts < playlist.length - 1) {
          return playTrackAt(safeIndex + 1, attempts + 1);
        }
        console.warn('오디오 재생 실패:', error);
        return false;
      }
    }

    async function playNextTrack() {
      await playTrackAt(currentTrackIndex + 1);
    }

    async function startMusic() {
      const ok = await playTrackAt(currentTrackIndex);
      if (!ok) {
        alert('오디오 재생에 실패했습니다. moon/bgm.mp3, moon/bgm1.mp3, moon/bgm2.mp3 파일 경로를 확인해 주세요.');
      }
    }

    async function toggleMusic() {
      if (bgm.paused) {
        await playTrackAt(currentTrackIndex);
      } else {
        bgm.pause();
        audioToggle.textContent = '음악 켜기';
      }
    }

    function addInteractionToStartMusic() {
      const unlock = async () => {
        if (bgm.paused) {
          try {
            await playTrackAt(currentTrackIndex);
          } catch (error) {}
        }
        document.removeEventListener('click', unlock);
        document.removeEventListener('keydown', unlock);
        document.removeEventListener('touchstart', unlock);
      };

      document.addEventListener('click', unlock, { once: true });
      document.addEventListener('keydown', unlock, { once: true });
      document.addEventListener('touchstart', unlock, { once: true });
    }

    function bindEvents() {
      audioStartBtn.addEventListener('click', startMusic);
      audioToggle.addEventListener('click', toggleMusic);
      bgm.addEventListener('ended', playNextTrack);

      bgm.addEventListener('error', () => {
        console.warn('현재 오디오 파일을 불러오지 못했습니다. 다음 트랙을 시도합니다.');
        playNextTrack();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') goNext();
        if (e.key === 'ArrowLeft') goPrev();
        if (e.key === ' ') {
          e.preventDefault();
          isPaused = !isPaused;
        }
      });
    }

    async function init() {
      playOrder = buildPlayOrder();
      currentIndex = 0;

      setTrack(0);
      await renderIndex(0);
      startAutoPlay();
      bindEvents();
      addInteractionToStartMusic();
    }

    window.addEventListener('load', init);
  </script>
