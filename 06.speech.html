<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인사 - 상시 음성 인식</title>
   
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            /* 요청하신 색상 #DEC654로 변경 */
            --neon-blue: #DEC654; 
            --deep-space: #010103;
            --glow-gold: #ffdd00;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--deep-space);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #instruction-text {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: white;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 5px;
            /* 텍스트 글로우 효과도 테마 색상에 맞춰 조정 */
            text-shadow: 0 0 20px rgba(222, 198, 84, 0.9), 0 0 40px rgba(222, 198, 84, 0.5);
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            pointer-events: none;
        }

        .input-group {
            display: flex;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(222, 198, 84, 0.3);
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(222, 198, 84, 0.1);
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 25px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            letter-spacing: 1px;
            text-align: center;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--deep-space);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #start-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(222, 198, 84, 0.2);
        }

        #start-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        #text-canvas {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <button id="start-btn">마이크 켜고 시작하기</button>
    </div>

    <div id="instruction-text">자유롭게 아무 말이나 해보세요 ✨</div>

    <div class="ui-panel">
        <div class="input-group">
            <input type="text" id="text-input" placeholder="준비 중..." readonly autocomplete="off">
        </div>
    </div>

    <canvas id="text-canvas"></canvas>
    <div id="canvas-container"></div>

    <script>
        const textInput = document.getElementById('text-input');
        const loadingScreen = document.getElementById('loading-screen');
        const startBtn = document.getElementById('start-btn');
        const instructionText = document.getElementById('instruction-text');
        const textCanvas = document.getElementById('text-canvas');
        const tCtx = textCanvas.getContext('2d', { willReadFrequently: true });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const particleCount = 45000;
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const geometry = new THREE.BufferGeometry();

        let isTextMode = false;
        let isInitialLoad = true;
        let mouse = new THREE.Vector3(-1000, -1000, 0);
        let clearTimer = null;

        // --- 파티클 기본 색상을 #DEC654로 변경 ---
        const baseColor = new THREE.Color(0xDEC654); 
        const goldColor = new THREE.Color(0xffdd00);

        function createSphere() {
            isTextMode = false;
            textInput.value = "";
            const radius = 30;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const u = Math.random();
                const v = Math.random();
                const theta = 2 * Math.PI * u;
                const phi = Math.acos(2 * v - 1);
               
                targetPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                targetPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                targetPositions[i3 + 2] = radius * Math.cos(phi);
            }
        }

        function textToPoints(text) {
            if(!text) return;
            isTextMode = true;
            isInitialLoad = false;
            const fontSize = 100;
            tCtx.font = `bold ${fontSize}px Arial`;
           
            const metrics = tCtx.measureText(text);
            const textWidth = Math.ceil(metrics.width) + 40;
            const textHeight = fontSize * 1.5;

            textCanvas.width = textWidth;
            textCanvas.height = textHeight;
           
            tCtx.fillStyle = 'white';
            tCtx.font = `bold ${fontSize}px Arial`;
            tCtx.textAlign = 'center';
            tCtx.textBaseline = 'middle';
            tCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            tCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);

            const imageData = tCtx.getImageData(0, 0, textCanvas.width, textCanvas.height);
            const pixels = imageData.data;
            const points = [];

            const maxWorldWidth = 140;
            let scale = 0.6;
            if ((textWidth * scale) > maxWorldWidth) {
                scale = maxWorldWidth / textWidth;
            }

            for (let y = 0; y < textCanvas.height; y += 1) {
                for (let x = 0; x < textCanvas.width; x += 1) {
                    const alpha = pixels[(y * textCanvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        points.push({
                            x: (x - textCanvas.width / 2) * scale,
                            y: (textCanvas.height / 2 - y) * scale
                        });
                    }
                }
            }

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const p = points[i % points.length];
                const noise = 0.5;
                targetPositions[i3] = p.x + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 1] = p.y + (Math.random() - 0.5) * noise;
                targetPositions[i3 + 2] = (Math.random() - 0.5) * noise;
            }
        }

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 1200;
            positions[i3 + 1] = (Math.random() - 0.5) * 1200;
            positions[i3 + 2] = (Math.random() - 0.5) * 1200;
           
            colors[i3] = baseColor.r;
            colors[i3 + 1] = baseColor.g;
            colors[i3 + 2] = baseColor.b;
        }
        createSphere();

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.15,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const pointsObj = new THREE.Points(geometry, material);
        scene.add(pointsObj);
        camera.position.z = 100;

        window.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
           
            const vector = new THREE.Vector3(x, y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            mouse = camera.position.clone().add(dir.multiplyScalar(distance));
        });

        function animate() {
            requestAnimationFrame(animate);

            const posAttr = geometry.attributes.position;
            const colAttr = geometry.attributes.color;
           
            const mouseInfluenceRadius = isTextMode ? 12 : 25;
            let currentLerpSpeed = isInitialLoad ? 0.015 : 0.05;
            const friction = isInitialLoad ? 0.95 : 0.85;  

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
               
                let tx = targetPositions[i3];
                let ty = targetPositions[i3 + 1];
                let tz = targetPositions[i3 + 2];

                if (!isTextMode) {
                    const angle = pointsObj.rotation.y;
                    const cos = Math.cos(angle);
                    const sin = Math.sin(angle);
                    const rx = tx * cos + tz * sin;
                    const rz = -tx * sin + tz * cos;
                    tx = rx;
                    tz = rz;
                }

                const dx = posAttr.array[i3] - mouse.x;
                const dy = posAttr.array[i3 + 1] - mouse.y;
                const dz = posAttr.array[i3 + 2] - mouse.z;
                const distSq = dx*dx + dy*dy + dz*dz;
                const dist = Math.sqrt(distSq);

                if (dist < mouseInfluenceRadius) {
                    const force = (mouseInfluenceRadius - dist) / mouseInfluenceRadius;
                    velocities[i3] += (dx / dist) * force * 1.5;
                    velocities[i3 + 1] += (dy / dist) * force * 1.5;
                    velocities[i3 + 2] += (dz / dist) * force * 1.5;

                    colAttr.array[i3] += (goldColor.r - colAttr.array[i3]) * 0.2;
                    colAttr.array[i3+1] += (goldColor.g - colAttr.array[i3+1]) * 0.2;
                    colAttr.array[i3+2] += (goldColor.b - colAttr.array[i3+2]) * 0.2;
                } else {
                    colAttr.array[i3] += (baseColor.r - colAttr.array[i3]) * 0.05;
                    colAttr.array[i3+1] += (baseColor.g - colAttr.array[i3+1]) * 0.05;
                    colAttr.array[i3+2] += (baseColor.b - colAttr.array[i3+2]) * 0.05;
                }

                velocities[i3] *= friction;
                velocities[i3+1] *= friction;
                velocities[i3+2] *= friction;

                posAttr.array[i3] += velocities[i3];
                posAttr.array[i3+1] += velocities[i3+1];
                posAttr.array[i3+2] += velocities[i3+2];

                posAttr.array[i3] += (tx - posAttr.array[i3]) * currentLerpSpeed;
                posAttr.array[i3 + 1] += (ty - posAttr.array[i3 + 1]) * currentLerpSpeed;
                posAttr.array[i3 + 2] += (tz - posAttr.array[i3 + 2]) * currentLerpSpeed;
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;

            if (!isTextMode) {
                pointsObj.rotation.y += 0.003;
            } else {
                pointsObj.rotation.y *= 0.9;
            }

            renderer.render(scene, camera);
        }

        function resetClearTimer() {
            if (clearTimer) clearTimeout(clearTimer);
           
            clearTimer = setTimeout(() => {
                if (isTextMode) {
                    textInput.placeholder = "10초간 입력이 없어 초기화되었습니다.";
                    createSphere();
                }
            }, 10000);
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
           
            recognition.lang = 'ko-KR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            recognition.onstart = function() {
                textInput.placeholder = "🎤 듣고 있습니다. 말씀해주세요...";
            };

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                const cleanText = transcript.replace(/[.,!?]/g, '').trim().substring(0, 25);
               
                if (cleanText) {
                    textInput.value = cleanText;
                    textToPoints(cleanText);
                    resetClearTimer();
                }
            };

            recognition.onend = function() {
                textInput.placeholder = "잠깐 휴식 중... (곧 다시 듣습니다)";
                setTimeout(() => {
                    try {
                        recognition.start();
                    } catch(e) {
                        console.log("재시작 대기 중...");
                    }
                }, 1000);
            };

            startBtn.addEventListener('click', () => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    instructionText.style.opacity = '1';
                    setTimeout(() => { isInitialLoad = false; }, 4000);
                }, 500);

                try {
                    recognition.start();
                } catch(e) {
                    console.error("마이크 시작 오류", e);
                }
            });

        } else {
            alert("이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.!");
        }

        window.onload = () => {
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>
</html>
