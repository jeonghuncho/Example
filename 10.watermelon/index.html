<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수박 깨기 — 손을 휘둘러 수박을 가르세요</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
  }
  #stage { position: relative; width: 100vw; height: 100vh; }
  /* 원본 웹캠은 화면에 안 보이게 (MediaPipe 입력으로만 사용).
     검정 배경 위에 손 뼈대만 빛나게 표현한다. */
  #video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    pointer-events: none;
  }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
  #score {
    position: absolute; top: 22px; left: 28px;
    color: #fff; font-size: 30px; font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.6);
    letter-spacing: 0.02em;
  }
  #status {
    position: absolute; top: 32px; left: 50%;
    transform: translateX(-50%);
    padding: 16px 34px; border-radius: 999px;
    background: rgba(0,0,0,0.5); color: #fff;
    font-size: 24px; font-weight: 600;
    backdrop-filter: blur(8px); white-space: nowrap;
    transition: opacity 0.4s;
  }
  /* 시작 오버레이 — 탭해서 오디오를 켜고 게임을 시작 (브라우저 자동재생 정책) */
  #start {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; cursor: pointer;
    background: rgba(0,0,0,0.82); color: #fff; text-align: center;
    font-weight: 800; transition: opacity 0.3s;
  }
  #start .emoji { font-size: 84px; }
  #start .title { font-size: 34px; }
  #start .sub { font-size: 18px; font-weight: 600; opacity: 0.8; }
</style>
</head>
<body>
<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="score">🍉 0</div>
  <div id="status">모델 불러오는 중…</div>
  <div id="start">
    <div class="emoji">🍉</div>
    <div class="title">화면을 탭하면 시작!</div>
    <div class="sub">소리를 켜고 수박 자르기를 시작합니다</div>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video  = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");
const status = document.getElementById("status");
const scoreEl = document.getElementById("score");

const W = () => canvas.width;
const H = () => canvas.height;
const S = () => H() / 1080; // 1080p 기준 스케일

// ── 좌표 변환: 비디오 정규좌표 → 캔버스(미러 + object-fit: cover 보정) ──
function coverMap() {
  const scale = Math.max(W() / video.videoWidth, H() / video.videoHeight);
  return {
    scale,
    offX: (W() - video.videoWidth * scale) / 2,
    offY: (H() - video.videoHeight * scale) / 2,
  };
}
function toCanvas(p, m) {
  return {
    x: W() - (m.offX + p.x * video.videoWidth * m.scale),
    y: m.offY + p.y * video.videoHeight * m.scale,
  };
}

// ── 발광 스프라이트 (가산 합성용) ────────────────────────
function makeSprite(mid, edge) {
  const c = document.createElement("canvas");
  c.width = c.height = 64;
  const g = c.getContext("2d");
  const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.45, mid);
  grad.addColorStop(1, edge);
  g.fillStyle = grad;
  g.fillRect(0, 0, 64, 64);
  return c;
}
const spriteJuice = makeSprite("rgba(255,70,90,0.95)", "rgba(220,30,60,0)"); // 빨간 과즙
const spriteSpark = makeSprite("rgba(255,210,80,0.98)", "rgba(255,80,0,0)");  // 주황 불꽃
function blobImg(img, x, y, r, a) {
  ctx.globalAlpha = Math.max(0, Math.min(1, a));
  ctx.drawImage(img, x - r * 1.6, y - r * 1.6, r * 3.2, r * 3.2);
}

// ── 효과음 (실제 음원 watermelon-smash.mp3) ──────────────
let audioCtx = null, smashBuffer = null, smashLoading = false, lastSmashAt = 0;

function initAudio() {
  if (audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  audioCtx = new AC();
  loadSmash();
}
async function loadSmash() {
  if (smashBuffer || smashLoading || !audioCtx) return;
  smashLoading = true;
  try {
    const res = await fetch("watermelon-smash.mp3");
    smashBuffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
  } catch (e) { console.error("효과음 로드 실패:", e); }
  smashLoading = false;
}
function unlockAudio() {
  initAudio();
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
["pointerdown", "touchstart", "keydown"].forEach((e) =>
  window.addEventListener(e, unlockAudio));

// 시작 오버레이: 탭하면 오디오를 확실히 켜고(사용자 제스처) 오버레이를 숨긴다.
// 게임은 손동작만 쓰므로, 이 탭이 없으면 브라우저가 소리를 막아 무음이 된다.
const startOverlay = document.getElementById("start");
function dismissStart() {
  unlockAudio();
  startOverlay.style.opacity = "0";
  setTimeout(() => (startOverlay.style.display = "none"), 300);
}
startOverlay.addEventListener("pointerdown", dismissStart);

function playSmash() {
  if (!audioCtx || audioCtx.state !== "running" || !smashBuffer) return;
  const nowMs = performance.now();
  if (nowMs - lastSmashAt < 60) return; // 동시 다발 슬라이스 솎아내기
  lastSmashAt = nowMs;
  const t = audioCtx.currentTime;
  const src = audioCtx.createBufferSource();
  src.buffer = smashBuffer;
  src.playbackRate.value = 0.9 + Math.random() * 0.3; // 음색 다양화
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.9, t);
  gain.gain.setValueAtTime(0.9, t + 0.5);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.85);
  src.connect(gain).connect(audioCtx.destination);
  src.start(t, 0);
  src.stop(t + 0.9); // 타격 순간만 짧게
}

// ── 수박 ─────────────────────────────────────────────────
const melons = [];   // 날아다니는 통수박
const halves = [];    // 갈라진 반쪽
const juices = [];    // 과즙 방울
const seeds = [];     // 씨
const slashes = [];   // 칼자국 선
let score = 0;
let lastSpawn = 0;

// ── 과일 종류 (색·점수·크기·등장확률) ────────────────────
const FRUITS = [
  { id: "watermelon", rind: "#2f7d34", rind2: "#5db85d", flesh: ["#ff5a6e", "#e23b53"], score: 1, rscale: 1.0,  weight: 30, stripes: true,  seeds: true },
  { id: "apple",      rind: "#b5271b", rind2: "#e8493b", flesh: ["#fff0d8", "#ffd8a8"], score: 2, rscale: 0.6,  weight: 22 },
  { id: "orange",     rind: "#d4691a", rind2: "#f39c12", flesh: ["#ffd27a", "#ffb24d"], score: 2, rscale: 0.64, weight: 20 },
  { id: "lemon",      rind: "#cfa70c", rind2: "#f1c40f", flesh: ["#fff7c4", "#ffe97a"], score: 3, rscale: 0.54, weight: 13 },
  { id: "golden",     rind: "#9c6b08", rind2: "#ffd700", flesh: ["#fff6c8", "#ffd24d"], score: 8, rscale: 0.68, weight: 5,  special: "golden" },
  { id: "ice",        rind: "#4f97c4", rind2: "#a9def9", flesh: ["#e6f6ff", "#b8e4ff"], score: 3, rscale: 0.68, weight: 8,  special: "ice" },
];
const FRUIT_TOTAL = FRUITS.reduce((s, f) => s + f.weight, 0);
function pickFruit() {
  let r = Math.random() * FRUIT_TOTAL;
  for (const f of FRUITS) { if ((r -= f.weight) < 0) return f; }
  return FRUITS[0];
}

// ── 메타 상태 (최고점수·피버·슬로우모션) ─────────────────
let bestScore = +(localStorage.getItem("wm_best") || 0);
let fever = false;              // 피버 모드 (점수 2배 + 연출)
const FEVER_COMBO = 8;          // 이 콤보 이상이면 피버
let timeScale = 1;              // 1=정상, <1=슬로우모션(얼음 과일)

function updateScoreHud() {
  scoreEl.textContent = `🍉 ${score}   ⭐ ${bestScore}   🔥 ${bestCombo}`;
}

// ── 게임 단계 & 안내 문구 ────────────────────────────────
const PROMPT_HAND  = "✋ 화면에 손바닥을 보여주세요";
const PROMPT_SLICE = "✋ 손을 빠르게 휘둘러 수박을 가르세요!";
const PROMPT_FAR   = "🖐️ 손을 조금만 뒤로 떨어뜨려 주세요";
const TOO_CLOSE = 0.34; // 손바닥(손목~중지뿌리) 정규길이가 이 값 이상이면 카메라에 너무 가까움
let phase = "waiting";        // "waiting"(손 대기, 수박 없음) | "playing"(수박 등장)
let started = false;          // 첫 수박을 잘랐는지 (자르면 안내 문구 숨김)
let lastHandSeen = 0;         // 마지막으로 손이 보인 시각
const HAND_ABSENCE_MS = 10000; // 손이 이만큼 안 보이면 점수 초기화 + 대기 상태로

// ── 강렬한 임팩트 연출 상태 (철권 스타일) ────────────────
let shake = 0;        // 화면 흔들림 강도(px)
let flash = 0;        // 전체 화면 섬광 (1→0)
let vignette = 0;     // 가장자리 빨강 비네트 (1→0)
let combo = 0;
let bestCombo = 0;
let lastSliceAt = -9999; // 마지막으로 자른 시각 (HUD 펄스 애니메이션용)
// 콤보 = 수박을 놓치지 않고 연속으로 자른 횟수. 한 개라도 놓치면(화면 밖으로 보내면) 0으로 끊김.
const shockwaves = []; // 충격파 고리
const sparks = [];     // 불꽃 스파크
const impactTexts = []; // "n COMBO!" + 등급 문구

// 콤보 등급: 높을수록 화려한 문구/색
function comboTier(c) {
  if (c >= 15) return { word: "GODLIKE!!!", col: ["#ff6bff", "#ff1a55"] };
  if (c >= 10) return { word: "INSANE!!",  col: ["#ffd24d", "#ff2a6d"] };
  if (c >= 7)  return { word: "AWESOME!",  col: ["#fff2a8", "#ff4d2a"] };
  if (c >= 5)  return { word: "GREAT!",    col: ["#fff2a8", "#ff7a1a"] };
  if (c >= 3)  return { word: "NICE!",     col: ["#fff6c8", "#ffb01a"] };
  return { word: "", col: ["#fff6c8", "#ffae3a"] };
}

// 진입 방향을 랜덤하게 — 아래→위, 위→아래, 좌→우, 우→좌
function spawnMelon(now) {
  const fruit = pickFruit();
  const r = (70 + Math.random() * 35) * S() * fruit.rscale;
  // 아래→위가 조금 더 자주 나오게 가중
  const pat = ["up", "up", "down", "left", "right"][(Math.random() * 5) | 0];
  let x, y, vx, vy;
  if (pat === "up") {
    const fromLeft = Math.random() < 0.5;
    x = fromLeft ? W() * (0.15 + Math.random() * 0.25) : W() * (0.6 + Math.random() * 0.25);
    y = H() + r;
    vy = -(1.15 + Math.random() * 0.2) * H();        // 위로 던짐
    vx = (fromLeft ? 1 : -1) * (0.05 + Math.random() * 0.12) * W();
  } else if (pat === "down") {
    x = W() * (0.2 + Math.random() * 0.6);
    y = -r;
    vy = (0.45 + Math.random() * 0.25) * H();         // 위에서 떨어짐
    vx = (Math.random() - 0.5) * 0.25 * W();
  } else { // left / right — 옆에서 포물선으로 가로지름
    const fromLeft = pat === "left";
    x = fromLeft ? -r : W() + r;
    y = H() * (0.25 + Math.random() * 0.4);
    vx = (fromLeft ? 1 : -1) * (0.5 + Math.random() * 0.25) * W();
    vy = -(0.35 + Math.random() * 0.35) * H();
  }
  melons.push({ x, y, vx: vx * MELON_SPEED, vy: vy * MELON_SPEED, r, rot: Math.random() * 6.28,
    vrot: (Math.random() - 0.5) * 2, fruit });
}

// 수박 전체 속도 배율 (작을수록 느림). 같은 궤적을 유지한 채 더 천천히 움직이게 한다.
const MELON_SPEED = 0.9;
const GRAV = () => 2.0 * H() * MELON_SPEED * MELON_SPEED; // 중력도 배율²로 맞춰 궤적 보존

function updateMelons(now, dt) {
  // 일정 간격으로 새 수박 (동시 최대 4개)
  if (phase === "playing" && now - lastSpawn > 1300 && melons.length < 4) {
    lastSpawn = now;
    spawnMelon(now);
  }
  for (let i = melons.length - 1; i >= 0; i--) {
    const m = melons[i];
    m.vy += GRAV() * dt;
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.rot += m.vrot * dt;
    // 화면 밖(아래·좌·우)으로 벗어나면 = 못 자르고 놓침 → 콤보 끊김
    if (m.y - m.r > H() + 60 || m.x < -m.r - 90 || m.x > W() + m.r + 90) {
      melons.splice(i, 1);
      if (combo > 0) { combo = 0; fever = false; updateScoreHud(); } // 놓치면 콤보·피버 끊김
    }
  }
}

// 과일 한 통 그리기 (종류별 색·무늬)
function drawMelonBody(m) {
  const { x, y, r, rot, fruit } = m;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  // 껍질
  const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r);
  g.addColorStop(0, fruit.rind2);
  g.addColorStop(1, fruit.rind);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();
  // 수박 줄무늬
  if (fruit.stripes) {
    ctx.strokeStyle = "rgba(20,80,30,0.55)";
    ctx.lineWidth = r * 0.09;
    for (let k = -2; k <= 2; k++) {
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.32, r, k * 0.5, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();
    }
  }
  // 광택 하이라이트
  ctx.beginPath();
  ctx.ellipse(-r * 0.35, -r * 0.4, r * 0.22, r * 0.13, -0.6, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.35)";
  ctx.fill();
  ctx.restore();
  // 황금/얼음 특수 외곽 발광 (가산 합성)
  if (fruit.special) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = fruit.special === "golden" ? "rgba(255,215,0,0.6)" : "rgba(160,222,249,0.6)";
    ctx.lineWidth = 5 * S();
    ctx.beginPath();
    ctx.arc(x, y, r + 3 * S(), 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// 갈라진 반쪽 그리기 (단면 과육 보임)
function drawHalf(h) {
  const fruit = h.fruit;
  ctx.save();
  ctx.translate(h.x, h.y);
  ctx.rotate(h.angle + h.rot);
  const r = h.r;
  // 과육 반원: 단면이 위(local)를 향하도록 아래쪽 반원을 채움
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI);
  ctx.closePath();
  const g = ctx.createLinearGradient(0, 0, 0, r);
  g.addColorStop(0, fruit.flesh[0]);
  g.addColorStop(1, fruit.flesh[1]);
  ctx.fillStyle = g;
  ctx.fill();
  // 껍질 호
  ctx.lineWidth = r * 0.13;
  ctx.strokeStyle = fruit.rind;
  ctx.beginPath();
  ctx.arc(0, 0, r - r * 0.04, 0, Math.PI);
  ctx.stroke();
  // 단면 가장자리 밝은 테
  ctx.lineWidth = r * 0.05;
  ctx.strokeStyle = "rgba(255,255,255,0.85)";
  ctx.beginPath();
  ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
  ctx.stroke();
  // 단면 씨 (씨 있는 과일만)
  if (fruit.seeds) {
    ctx.fillStyle = "rgba(30,20,20,0.9)";
    for (const sd of h.seeds) {
      ctx.beginPath();
      ctx.ellipse(sd.x * r, sd.y * r, r * 0.035, r * 0.06, 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function sliceMelon(m, dirAngle) {
  melons.splice(melons.indexOf(m), 1);
  const fruit = m.fruit;
  score += fruit.score * (fever ? 2 : 1); // 피버 중엔 2배
  if (score > bestScore) { bestScore = score; localStorage.setItem("wm_best", bestScore); }
  started = true; // 처음 자르면 안내 문구가 사라진다
  playSmash();
  if (fruit.special === "ice") timeScale = 0.35;        // 얼음 → 슬로우모션 발동
  if (fruit.special === "golden")                       // 황금 → 큰 보너스 충격파
    shockwaves.push({ x: m.x, y: m.y, life: 0, max: 0.6, r0: m.r, r1: m.r * 9, rgb: "255,215,80" });

  // 단면용 씨 배치 (반원 내부, y는 0~1 아래쪽)
  const makeSeeds = () => {
    const arr = [];
    for (let k = 0; k < 7; k++) {
      arr.push({ x: (Math.random() - 0.5) * 1.2, y: 0.25 + Math.random() * 0.6 });
    }
    return arr;
  };
  // 칼 방향(dirAngle)으로 갈라지고, 수직 방향으로 두 조각이 벌어짐
  const sep = 0.5 * H();
  const nx = Math.cos(dirAngle + Math.PI / 2), ny = Math.sin(dirAngle + Math.PI / 2);
  for (const sign of [1, -1]) {
    halves.push({
      x: m.x, y: m.y, r: m.r, fruit,
      angle: dirAngle + (sign > 0 ? 0 : Math.PI), // 단면이 칼선을 따라
      rot: 0, vrot: (Math.random() - 0.5) * 3 + sign * 1.2,
      vx: m.vx * 0.4 + nx * sign * sep,
      vy: m.vy * 0.4 + ny * sign * sep - 0.15 * H(),
      seeds: makeSeeds(), life: 0,
    });
  }
  // 과즙 분출
  for (let k = 0; k < 18; k++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (120 + Math.random() * 620) * S();
    juices.push({ x: m.x, y: m.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.1 * H(),
      r: (3 + Math.random() * 6) * S(), life: 0, max: 0.5 + Math.random() * 0.6 });
  }
  // 씨 튀기기
  for (let k = 0; k < 6; k++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (200 + Math.random() * 480) * S();
    seeds.push({ x: m.x, y: m.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.2 * H(),
      rot: Math.random() * 6.28, vrot: (Math.random() - 0.5) * 16,
      len: (10 + Math.random() * 6) * S(), life: 0, max: 1.0 + Math.random() * 0.6 });
  }
  // 칼자국
  slashes.push({ x: m.x, y: m.y, angle: dirAngle, len: m.r * 2.6, life: 0, max: 0.25 });

  // ── 철권 같은 강렬한 임팩트 연출 ──
  const tnow = performance.now();
  combo = combo + 1; // 자를 때마다 콤보 증가 (놓치면 updateMelons에서 0으로 끊김)
  lastSliceAt = tnow;
  if (combo > bestCombo) bestCombo = combo;
  if (combo >= FEVER_COMBO) fever = true; // 콤보 쌓이면 피버 모드
  updateScoreHud();

  shake = Math.min(46 * S(), Math.max(shake, (22 + combo * 4) * S())); // 화면 흔들림
  flash = 1;      // 전체 섬광
  vignette = 1;   // 가장자리 빨강

  // 충격파 고리 2개
  shockwaves.push({ x: m.x, y: m.y, life: 0, max: 0.4, r0: m.r * 0.5, r1: m.r * 6, rgb: "255,210,90" });
  shockwaves.push({ x: m.x, y: m.y, life: 0, max: 0.55, r0: m.r * 0.4, r1: m.r * 4.5, rgb: "255,90,40" });

  // 불꽃 스파크
  for (let k = 0; k < 14; k++) {
    const a = Math.random() * Math.PI * 2;
    const sp = (320 + Math.random() * 960) * S();
    sparks.push({ x: m.x, y: m.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      r: (2.5 + Math.random() * 5) * S(), life: 0, max: 0.3 + Math.random() * 0.4 });
  }

  // 임팩트 텍스트 — 1콤보부터 매번 "n COMBO!" + 등급 문구
  const tier = comboTier(combo);
  impactTexts.push({
    text: `${combo} COMBO!`, sub: tier.word, col: tier.col,
    size: 48 + Math.min(combo, 16) * 3.4, // 콤보 클수록 크게
    x: m.x, y: m.y, life: 0, max: 0.85, combo,
  });
}

function updateDebris(dt) {
  const g = GRAV();
  for (let i = halves.length - 1; i >= 0; i--) {
    const h = halves[i];
    h.life += dt; h.vy += g * dt;
    h.x += h.vx * dt; h.y += h.vy * dt; h.rot += h.vrot * dt;
    if (h.y - h.r > H() + 60) halves.splice(i, 1);
  }
  for (let i = juices.length - 1; i >= 0; i--) {
    const j = juices[i];
    j.life += dt;
    if (j.life > j.max) { juices.splice(i, 1); continue; }
    j.vy += g * 0.7 * dt; j.x += j.vx * dt; j.y += j.vy * dt;
  }
  for (let i = seeds.length - 1; i >= 0; i--) {
    const s = seeds[i];
    s.life += dt;
    if (s.life > s.max) { seeds.splice(i, 1); continue; }
    s.vy += g * dt; s.x += s.vx * dt; s.y += s.vy * dt; s.rot += s.vrot * dt;
  }
  for (let i = slashes.length - 1; i >= 0; i--) {
    slashes[i].life += dt;
    if (slashes[i].life > slashes[i].max) slashes.splice(i, 1);
  }
}

function drawDebris() {
  // 과즙 (가산 발광)
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const j of juices) {
    blobImg(spriteJuice, j.x, j.y, j.r, (1 - j.life / j.max) * 0.9);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  // 갈라진 반쪽
  for (const h of halves) drawHalf(h);
  // 씨
  ctx.fillStyle = "rgba(25,18,18,0.95)";
  for (const s of seeds) {
    ctx.save();
    ctx.translate(s.x, s.y); ctx.rotate(s.rot);
    ctx.globalAlpha = Math.min(1, (1 - s.life / s.max) * 1.5);
    ctx.beginPath();
    ctx.ellipse(0, 0, s.len * 0.35, s.len * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  // 칼자국 (흰 섬광)
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const sl of slashes) {
    const a = 1 - sl.life / sl.max;
    const dx = Math.cos(sl.angle) * sl.len / 2, dy = Math.sin(sl.angle) * sl.len / 2;
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = 6 * S() * a + 1;
    ctx.beginPath();
    ctx.moveTo(sl.x - dx, sl.y - dy);
    ctx.lineTo(sl.x + dx, sl.y + dy);
    ctx.stroke();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── 강렬한 임팩트 연출: 업데이트 & 그리기 ────────────────
function updateImpact(dt) {
  shake *= Math.pow(0.015, dt);            // 빠르게 감쇠
  if (shake < 0.4) shake = 0;
  flash = Math.max(0, flash - dt / 0.16);   // ~0.16초 섬광
  vignette = Math.max(0, vignette - dt / 0.45);
  for (let i = shockwaves.length - 1; i >= 0; i--) {
    shockwaves[i].life += dt;
    if (shockwaves[i].life > shockwaves[i].max) shockwaves.splice(i, 1);
  }
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.life += dt;
    if (s.life > s.max) { sparks.splice(i, 1); continue; }
    s.vx *= Math.pow(0.05, dt); s.vy *= Math.pow(0.05, dt);
    s.vy += GRAV() * 0.4 * dt;
    s.x += s.vx * dt; s.y += s.vy * dt;
  }
  for (let i = impactTexts.length - 1; i >= 0; i--) {
    impactTexts[i].life += dt;
    if (impactTexts[i].life > impactTexts[i].max) impactTexts.splice(i, 1);
  }
}

// 월드 좌표(화면 흔들림 안)에서 그리는 것: 충격파 + 스파크
function drawImpactWorld() {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const w of shockwaves) {
    const t = w.life / w.max;
    const ease = 1 - Math.pow(1 - t, 3);
    const r = w.r0 + (w.r1 - w.r0) * ease;
    ctx.beginPath();
    ctx.arc(w.x, w.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${w.rgb},${(1 - t) * 0.9})`;
    ctx.lineWidth = (10 * (1 - t) + 1) * S();
    ctx.stroke();
  }
  for (const s of sparks) {
    blobImg(spriteSpark, s.x, s.y, s.r, (1 - s.life / s.max) * 0.95);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// 화면 고정으로 그리는 것: 섬광 + 비네트 + 콤보 HUD + 임팩트 텍스트
function drawImpactScreen(now) {
  // 피버 모드: 화면 가장자리 주황 불꽃 + 상단 라벨 (점수 2배 상태)
  if (fever) {
    const puls = 0.5 + 0.5 * Math.sin(now / 90);
    const g = ctx.createRadialGradient(W() / 2, H() / 2, H() * 0.32, W() / 2, H() / 2, H() * 0.8);
    g.addColorStop(0, "rgba(255,120,0,0)");
    g.addColorStop(1, `rgba(255,90,0,${0.35 + 0.2 * puls})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W(), H());
    ctx.save();
    ctx.textAlign = "center";
    ctx.font = `900 ${40 * S()}px -apple-system, sans-serif`;
    ctx.lineWidth = 7 * S();
    ctx.strokeStyle = "rgba(80,0,0,0.9)";
    ctx.strokeText("🔥 FEVER ×2 🔥", W() / 2, 92 * S());
    const fg = ctx.createLinearGradient(0, 60 * S(), 0, 100 * S());
    fg.addColorStop(0, "#fff2a8"); fg.addColorStop(1, "#ff5a1a");
    ctx.fillStyle = fg;
    ctx.fillText("🔥 FEVER ×2 🔥", W() / 2, 92 * S());
    ctx.restore();
  }
  if (flash > 0) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.fillStyle = `rgba(255,235,200,${flash * 0.55})`;
    ctx.fillRect(0, 0, W(), H());
    ctx.restore();
  }
  if (vignette > 0) {
    const g = ctx.createRadialGradient(W() / 2, H() / 2, H() * 0.3, W() / 2, H() / 2, H() * 0.75);
    g.addColorStop(0, "rgba(200,0,0,0)");
    g.addColorStop(1, `rgba(190,0,0,${vignette * 0.6})`);
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W(), H());
  }

  // ── 진행 중 콤보 HUD (큰 숫자) — 콤보가 유지되는 동안 계속 표시 ──
  if (combo >= 1) {
    const tier = comboTier(combo);
    const cx = W() / 2, cy = 210 * S();
    const pulse = 1 + 0.25 * Math.max(0, 1 - (now - lastSliceAt) / 130); // 자른 직후 커졌다 줄어듦
    ctx.save();
    ctx.textAlign = "center";
    ctx.translate(cx, cy);
    ctx.scale(pulse, pulse);
    ctx.font = `900 ${78 * S()}px -apple-system, sans-serif`;
    ctx.lineWidth = 9 * S();
    ctx.strokeStyle = "rgba(60,0,12,0.95)";
    ctx.strokeText(`${combo}`, 0, 0);
    const grad = ctx.createLinearGradient(0, -50 * S(), 0, 30 * S());
    grad.addColorStop(0, tier.col[0]);
    grad.addColorStop(1, tier.col[1]);
    ctx.fillStyle = grad;
    ctx.fillText(`${combo}`, 0, 0);
    // "COMBO" 라벨
    ctx.font = `800 ${26 * S()}px -apple-system, sans-serif`;
    ctx.lineWidth = 5 * S();
    ctx.strokeText("COMBO", 0, 34 * S());
    ctx.fillStyle = "#fff";
    ctx.fillText("COMBO", 0, 34 * S());
    ctx.restore();
  }

  // ── 자를 때마다 튀어나오는 "n COMBO!" + 등급 문구 ──
  for (const t of impactTexts) {
    const k = t.life / t.max;
    const pop = 1 + 0.4 * (1 - Math.min(1, t.life / 0.13));
    const rise = -60 * S() - t.life * 50 * S(); // 살짝 떠오름
    const alpha = k < 0.7 ? 1 : 1 - (k - 0.7) / 0.3;
    ctx.save();
    ctx.translate(t.x, t.y + rise);
    ctx.scale(pop, pop);
    ctx.globalAlpha = alpha;
    ctx.textAlign = "center";
    ctx.lineWidth = 8 * S();
    ctx.strokeStyle = "rgba(90,0,10,0.95)";
    const grad = ctx.createLinearGradient(0, -40 * S(), 0, 20 * S());
    grad.addColorStop(0, t.col[0]);
    grad.addColorStop(1, t.col[1]);
    // 메인 콤보 텍스트
    ctx.font = `900 ${t.size * S()}px -apple-system, sans-serif`;
    ctx.strokeText(t.text, 0, 0);
    ctx.fillStyle = grad;
    ctx.fillText(t.text, 0, 0);
    // 등급 문구 (있을 때만, 위쪽에)
    if (t.sub) {
      ctx.font = `900 ${t.size * 0.62 * S()}px -apple-system, sans-serif`;
      ctx.lineWidth = 6 * S();
      ctx.strokeText(t.sub, 0, -t.size * 0.85 * S());
      ctx.fillStyle = grad;
      ctx.fillText(t.sub, 0, -t.size * 0.85 * S());
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// ── 손(칼날) 추적 ────────────────────────────────────────
const blades = new Map(); // 손별 칼끝 상태 (검지 끝)
const SLICE_SPEED = 1.4;  // 화면너비/초 — 이 속도 이상 휘둘러야 베어짐

function getBlade(key) {
  if (!blades.has(key)) blades.set(key, { x: 0, y: 0, px: 0, py: 0, speed: 0, trail: [], init: false, lastSeen: 0 });
  return blades.get(key);
}

function processHand(key, lm, now, dt) {
  const b = getBlade(key);
  b.lastSeen = now;
  const m = coverMap();
  const tip = toCanvas(lm[8], m); // 검지 끝 = 칼끝
  if (!b.init) { b.x = tip.x; b.y = tip.y; b.init = true; }
  b.px = b.x; b.py = b.y;
  b.x = tip.x; b.y = tip.y;
  const dist = Math.hypot(b.x - b.px, b.y - b.py);
  b.speed = dt > 0 ? dist / dt / W() : 0; // 화면너비/초

  // 칼날 자취
  b.trail.push({ x: b.x, y: b.y, t: now });
  while (b.trail.length > 10) b.trail.shift();

  // 빠르게 휘두르는 중이면 통수박과 충돌 검사 (선분 교차)
  if (b.speed > SLICE_SPEED) {
    for (let i = melons.length - 1; i >= 0; i--) {
      const mel = melons[i];
      if (segCircleHit(b.px, b.py, b.x, b.y, mel.x, mel.y, mel.r)) {
        const dirAngle = Math.atan2(b.y - b.py, b.x - b.px);
        sliceMelon(mel, dirAngle);
      }
    }
  }
}

// 손 뼈대 연결 (MediaPipe 21 랜드마크)
const HAND_BONES = [
  [0,1],[1,2],[2,3],[3,4],          // 엄지
  [0,5],[5,6],[6,7],[7,8],          // 검지
  [5,9],[9,10],[10,11],[11,12],     // 중지
  [9,13],[13,14],[14,15],[15,16],   // 약지
  [13,17],[17,18],[18,19],[19,20],  // 새끼
  [0,17],                           // 손바닥
];

// 손 하나의 뼈대를 네온빛으로 그린다 (pts = 화면좌표 21점)
function drawOneHand(pts) {
  ctx.save();
  ctx.lineCap = "round";
  ctx.globalCompositeOperation = "lighter"; // 가산 합성으로 그림자 없이 네온 느낌
  // 외곽 글로우 (굵고 반투명한 시안)
  ctx.strokeStyle = "rgba(90,200,255,0.5)";
  ctx.lineWidth = 11 * S();
  for (const [a, b] of HAND_BONES) {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  }
  // 밝은 코어
  ctx.strokeStyle = "rgba(255,255,255,0.95)";
  ctx.lineWidth = 2.5 * S();
  for (const [a, b] of HAND_BONES) {
    ctx.beginPath();
    ctx.moveTo(pts[a].x, pts[a].y);
    ctx.lineTo(pts[b].x, pts[b].y);
    ctx.stroke();
  }
  // 관절 점
  for (let i = 0; i < pts.length; i++) {
    ctx.beginPath();
    ctx.arc(pts[i].x, pts[i].y, (i === 8 ? 9 : 5.5) * S(), 0, Math.PI * 2); // 칼끝(검지)은 크게
    ctx.fillStyle = i === 8 ? "rgba(255,255,255,1)" : "rgba(200,245,255,0.95)";
    ctx.fill();
  }
  ctx.restore();
}

// 검정 배경 위에 손 뼈대를 그린다
function drawSkeletons(now) {
  if (!lastResults || video.readyState < 2) return;
  const m = coverMap();
  for (const lm of lastResults.landmarks) {
    drawOneHand(lm.map((p) => toCanvas(p, m)));
  }
}

// 선분(ax,ay)-(bx,by)이 원(cx,cy,r)과 만나는지
function segCircleHit(ax, ay, bx, by, cx, cy, r) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy || 1;
  let t = ((cx - ax) * dx + (cy - ay) * dy) / len2;
  t = Math.max(0, Math.min(1, t));
  const px = ax + t * dx, py = ay + t * dy;
  return (px - cx) ** 2 + (py - cy) ** 2 <= r * r;
}

function drawBlades(now) {
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const [key, b] of blades) {
    if (now - b.lastSeen > 200 || b.trail.length < 2) continue;
    // 자취를 흰 칼날 선으로 (빠를수록 밝게)
    const bright = Math.min(1, b.speed / SLICE_SPEED);
    for (let i = 1; i < b.trail.length; i++) {
      const p0 = b.trail[i - 1], p1 = b.trail[i];
      const a = (i / b.trail.length) * (0.25 + 0.75 * bright);
      ctx.strokeStyle = `rgba(255,255,255,${a})`;
      ctx.lineWidth = (i / b.trail.length) * 12 * S() + 1;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y); ctx.lineTo(p1.x, p1.y);
      ctx.stroke();
    }
    // 칼끝 점
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6 * S(), 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.95)";
    ctx.fill();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── 메인 루프 ────────────────────────────────────────────
let handLandmarker = null;
let lastVideoTime = -1;
let lastFrameTime = performance.now();
let lastResults = null;
let ready = false;

// 손 인식용 다운스케일 캔버스 (풀해상도 영상 대신 작은 프레임을 처리해 부담 감소)
const detectCanvas = document.createElement("canvas");
const detectCtx = detectCanvas.getContext("2d");

// 레티나 디스플레이에서 캔버스 픽셀 수를 제한해 성능 확보 (M1 최적화).
// dpr 2~3을 1.5로 캡하면 픽셀 수가 절반~1/4로 줄어 렌더 부담이 크게 감소한다.
const DPR = Math.min(window.devicePixelRatio || 1, 1.5);
function resize() {
  canvas.width = Math.round(window.innerWidth * DPR);
  canvas.height = Math.round(window.innerHeight * DPR);
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
}
window.addEventListener("resize", resize);
resize();

// 점수·콤보 초기화
function resetGame() {
  score = 0; combo = 0; bestCombo = 0; started = false;
  fever = false; timeScale = 1;
  updateScoreHud();
}

// 대기 상태로 전환: 점수 초기화 + 화면의 수박·잔해 정리
function toWaiting() {
  phase = "waiting";
  resetGame();
  melons.length = 0; halves.length = 0; juices.length = 0; seeds.length = 0;
  slashes.length = 0; shockwaves.length = 0; sparks.length = 0; impactTexts.length = 0;
}

// 안내 문구 표시 & 단계 전환
function updatePrompt(now, handVisible, tooClose) {
  if (!ready) return; // 로딩 문구는 init()이 관리

  if (phase === "playing") {
    if (handVisible) lastHandSeen = now;
    if (now - lastHandSeen > HAND_ABSENCE_MS) toWaiting(); // 손 10초 부재 → 대기로
  } else if (handVisible) {
    // 대기 중 손이 잡히면 플레이 시작 (수박이 날아다니기 시작)
    phase = "playing"; started = false; lastHandSeen = now;
  }

  // 손이 카메라에 너무 가까우면 거리 안내를 최우선으로 표시
  if (tooClose) {
    status.textContent = PROMPT_FAR;
    status.style.opacity = "1";
    return;
  }

  if (phase === "waiting") {
    status.textContent = PROMPT_HAND;       // "화면에 손바닥을 보여주세요" (수박 없음)
    status.style.opacity = "1";
  } else {
    status.textContent = PROMPT_SLICE;      // "손을 휘둘러 가르세요"
    status.style.opacity = started ? "0" : "1"; // 첫 자르기 전까지 표시, 자르면 숨김
  }
}

// 손이 카메라에 너무 가까운지: 손바닥(손목~중지뿌리) 정규 길이로 판정
function isHandTooClose(landmarks) {
  for (const lm of landmarks) {
    if (Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y) > TOO_CLOSE) return true;
  }
  return false;
}

function loop() {
  const now = performance.now();
  const dt = Math.min((now - lastFrameTime) / 1000, 0.05);
  lastFrameTime = now;

  if (window.__pause) { requestAnimationFrame(loop); return; } // 디버그: 렌더 정지

  if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    // 다운스케일한 프레임으로 인식 (정규좌표 결과라 화면 매핑은 그대로)
    detectCtx.drawImage(video, 0, 0, detectCanvas.width, detectCanvas.height);
    lastResults = handLandmarker.detectForVideo(detectCanvas, now);
  }

  ctx.clearRect(0, 0, W(), H());

  // 슬로우모션: 게임 업데이트에만 timeScale 적용 (손 추적은 실시간 유지)
  timeScale += (1 - timeScale) * Math.min(1, 2 * dt); // 점차 정상속도로 복귀
  const sdt = dt * timeScale;
  updateMelons(now, sdt);
  updateDebris(sdt);
  updateImpact(sdt);

  // 손 추적·충돌 판정 (그리기 전에 상태만 갱신)
  const handVisible = !!(lastResults && video.readyState >= 2 && lastResults.landmarks.length > 0);
  const tooClose = handVisible && isHandTooClose(lastResults.landmarks);
  if (handVisible) {
    lastResults.landmarks.forEach((lm, i) => {
      const key = lastResults.handedness[i]?.[0]?.categoryName ?? `hand${i}`;
      processHand(key, lm, now, dt);
    });
  }
  for (const [key, b] of blades) if (now - b.lastSeen > 300) blades.delete(key);

  updatePrompt(now, handVisible, tooClose);

  // ── 월드 렌더 (화면 흔들림 적용) ──
  ctx.save();
  if (shake > 0.4) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  for (const m of melons) drawMelonBody(m);
  drawDebris();
  drawImpactWorld();    // 충격파 + 불꽃
  drawSkeletons(now);   // 손 뼈대
  drawBlades(now);      // 칼날 자취
  ctx.restore();

  // ── 화면 고정 오버레이 (섬광·비네트·콤보 HUD·임팩트 텍스트) ──
  drawImpactScreen(now);

  requestAnimationFrame(loop);
}

async function init() {
  loop(); // 카메라 준비 전에도 수박이 날아다니도록 먼저 시작
  try {
    status.textContent = "모델 불러오는 중…";
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU",
      },
      numHands: 2,
      runningMode: "VIDEO",
    });

    status.textContent = "카메라 켜는 중…";
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 960 }, height: { ideal: 540 }, facingMode: "user" },
      audio: false,
    });
    video.srcObject = stream;
    await new Promise((res) => (video.onloadedmetadata = res));

    // 손 인식용 다운스케일 캔버스 크기 (가로 480px 고정)
    detectCanvas.width = 480;
    detectCanvas.height = Math.round((480 * video.videoHeight) / video.videoWidth);

    ready = true;
    phase = "waiting";
    status.textContent = PROMPT_HAND; // 처음엔 손바닥을 보여달라는 안내 (수박 없음)
    status.style.opacity = "1";
    lastHandSeen = performance.now();
    unlockAudio();
  } catch (err) {
    status.textContent =
      err.name === "NotAllowedError" ? "카메라 권한을 허용해 주세요" : "오류: " + err.message;
    console.error(err);
  }
}

// 디버그/테스트용
window.__test = {
  tapStart: () => { dismissStart(); return { display: startOverlay.style.display }; },
  audio: () => ({ ctx: !!audioCtx, state: audioCtx?.state ?? "none", smashLoaded: !!smashBuffer }),
  spawn: () => { spawnMelon(performance.now()); return melons.length; },
  place: (fruitId) => { melons.length = 0; const fruit = FRUITS.find(f => f.id === fruitId) || FRUITS[0]; melons.push({ x: W() * 0.5, y: H() * 0.45, vx: 0, vy: 0, r: 95 * S() * fruit.rscale, rot: 0.3, vrot: 0, fruit }); return "placed " + fruit.id; },
  fruits: () => FRUITS.map(f => f.id),
  shot: (fruitId) => {
    window.__pause = true; fever = true;
    melons.length = 0; halves.length = 0;
    const fr = FRUITS.find(f => f.id === fruitId) || FRUITS[0];
    const cx = W() / 2, cy = H() * 0.45, r = 110 * S() * fr.rscale;
    melons.push({ x: cx, y: cy, vx: 0, vy: 0, r, rot: 0.3, vrot: 0, fruit: fr });
    halves.push({ x: cx + 160 * S(), y: cy, r: 90 * S(), fruit: fr, angle: 0.4, rot: 0, vrot: 0, vx: 0, vy: 0, seeds: [{x:0,y:0.4},{x:0.3,y:0.5},{x:-0.3,y:0.6}], life: 0 });
    ctx.clearRect(0, 0, W(), H());
    for (const m of melons) drawMelonBody(m);
    for (const h of halves) drawHalf(h);
    drawImpactScreen(performance.now());
    return "shot " + fr.id;
  },
  st: () => ({ score, bestScore, combo, fever, timeScale: +timeScale.toFixed(2) }),
  slice: () => { if (!melons.length) window.__test.place(); const m = melons[0]; sliceMelon(m, 0.35); return { score, halves: halves.length, juices: juices.length, seeds: seeds.length }; },
  state: () => ({ phase, melons: melons.length, halves: halves.length, score, combo, bestCombo, ready }),
  dump: () => melons.map((m) => ({ x: +(m.x / W()).toFixed(2), y: +(m.y / H()).toFixed(2), vx: +(m.vx / W()).toFixed(2), vy: +(m.vy / H()).toFixed(2) })),
  fakeBones: () => {
    // 카메라 없는 환경에서 뼈대 렌더 검증: 펼친 손 대략 포즈 (정규→화면 좌표)
    const base = [[0.5,0.92],[0.4,0.84],[0.34,0.75],[0.31,0.66],[0.29,0.58],
      [0.46,0.6],[0.45,0.45],[0.45,0.35],[0.45,0.27],
      [0.52,0.58],[0.53,0.42],[0.54,0.31],[0.54,0.22],
      [0.58,0.6],[0.6,0.45],[0.61,0.35],[0.62,0.28],
      [0.62,0.64],[0.66,0.53],[0.68,0.45],[0.69,0.39]];
    drawOneHand(base.map(([x,y]) => ({ x: x * W(), y: y * H() })));
    return "skeleton drawn";
  },
  // 수박을 화면 밖으로 보내 '놓침' 시뮬 → 콤보 끊김 확인
  miss: () => { melons.push({ x: -99999, y: 0, vx: 0, vy: 0, r: 50, rot: 0, vrot: 0 }); updateMelons(performance.now(), 0.016); return combo; },
  comboShot: (c = 8) => {
    // 정지 상태에서 콤보 HUD만 그려 검증
    window.__pause = true;
    combo = c; bestCombo = Math.max(bestCombo, c); lastSliceAt = performance.now();
    ctx.clearRect(0, 0, W(), H());
    drawImpactScreen(performance.now());
    return "combo HUD drawn";
  },
  // 안내 문구 / 손 부재 초기화 검증용
  forceReady: () => { ready = true; phase = "waiting"; status.textContent = PROMPT_HAND; lastHandSeen = performance.now(); return ready; },
  prompt: (handVisible, tooClose) => { updatePrompt(performance.now(), handVisible, tooClose); return { phase, text: status.textContent, opacity: status.style.opacity, started, score }; },
  closeCheck: (palmLen) => { const lm = Array.from({ length: 21 }, () => ({ x: 0.5, y: 0.5 })); lm[0] = { x: 0.5, y: 0.5 }; lm[9] = { x: 0.5, y: 0.5 - palmLen }; return isHandTooClose([lm]); },
  trySpawn: () => { lastSpawn = 0; updateMelons(performance.now(), 0.016); return melons.length; },
  setHandSeen: (agoMs) => { lastHandSeen = performance.now() - agoMs; return agoMs; },
};

updateScoreHud(); // 시작 시 최고점수 표시
init();
</script>
