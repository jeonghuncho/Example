<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Real Spark Neon Drawing</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: #fff;
  }
  #wrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #video {
    display: none;
  }
  #canvas {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 22px;
    text-align: center;
    letter-spacing: 2px;
  }
  #loading .dot {
    display: inline-block;
    animation: blink 1.4s infinite;
  }
  #loading .dot:nth-child(2) { animation-delay: 0.2s; }
  #loading .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="wrapper">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="1280" height="720"></canvas>
  <div id="loading">
    LOADING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const SKELETON_COLOR   = 'rgb(0, 253, 255)';
const DRAW_GLOW_COLOR  = 'rgb(255, 0, 0)';
const GRAB_GLOW_COLOR  = 'rgb(255, 255, 0)';
const SPARK_CORE_COLOR = 'rgb(255, 255, 255)';
const SPARK_GLOW_COLOR = 'rgb(255, 165, 0)';

const CLEAR_BTN = { x1: 20, y1: 20, x2: 150, y2: 80 };
const TOO_CLOSE_THRESHOLD = 300;

const MIN_POINT_DISTANCE = 4;
const MAX_POINTS_PER_SHAPE = 2500;
const MAX_SHAPES = 60;
const MAX_SPARKS = 500;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');

const W = canvas.width;
const H = canvas.height;

function makeCanvas() {
  const c = document.createElement('canvas');
  c.width = W;
  c.height = H;
  return c;
}

const glowCanvas = makeCanvas();
const coreCanvas = makeCanvas();
const sparkGlowCanvas = makeCanvas();
const sparkCoreCanvas = makeCanvas();

const gctx = glowCanvas.getContext('2d');
const cctx = coreCanvas.getContext('2d');
const sgctx = sparkGlowCanvas.getContext('2d');
const scctx = sparkCoreCanvas.getContext('2d');

let allSparks = [];
let shapes = [];
let currentShape = [];
let selectedShapeIdx = null;
let prevPinchPos = null;

let guideVisible = true;
let guideStartTime = null;
let tooClose = false;
let isProcessingFrame = false;

function dist(p1, p2) {
  return Math.hypot(p1[0] - p2[0], p1[1] - p2[1]);
}

function clearCanvas(c) {
  c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function resetDrawingState() {
  shapes = [];
  currentShape = [];
  allSparks = [];
  selectedShapeIdx = null;
  prevPinchPos = null;
}

function finalizeCurrentShape() {
  if (currentShape.length > 0) {
    shapes.push(currentShape);
    currentShape = [];

    if (shapes.length > MAX_SHAPES) {
      shapes.splice(0, shapes.length - MAX_SHAPES);
      selectedShapeIdx = null;
      prevPinchPos = null;
    }
  }
}

function addPointToCurrentShape(x, y) {
  const last = currentShape[currentShape.length - 1];

  if (!last || dist(last, [x, y]) >= MIN_POINT_DISTANCE) {
    currentShape.push([x, y]);

    if (currentShape.length > MAX_POINTS_PER_SHAPE) {
      currentShape.shift();
    }

    if (currentShape.length % 3 === 0) {
      for (let k = 0; k < 5; k++) {
        allSparks.push(new PinchSpark(x, y));
      }

      if (allSparks.length > MAX_SPARKS) {
        allSparks.splice(0, allSparks.length - MAX_SPARKS);
      }
    }
  }
}

class PinchSpark {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * 2 * Math.PI;
    const speed = 3 + Math.random() * 5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.life = 10 + Math.floor(Math.random() * 13);
    this.maxLife = 22;
    this.size = 1.2 + Math.random() * 1.6;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.life -= 1;
    this.vy += 0.3;
  }

  drawCore(cx) {
    if (this.life <= 0) return;
    const alpha = this.life / this.maxLife;
    cx.fillStyle = SPARK_CORE_COLOR;
    cx.beginPath();
    cx.arc(this.x, this.y, this.size * alpha + 1, 0, Math.PI * 2);
    cx.fill();
  }

  drawGlow(cx) {
    if (this.life <= 0) return;
    const alpha = (this.life / this.maxLife) * 0.7;
    cx.fillStyle = SPARK_GLOW_COLOR;
    cx.beginPath();
    cx.arc(this.x, this.y, this.size * alpha * 4 + 1, 0, Math.PI * 2);
    cx.fill();
  }
}

function drawGuideOverlay(cx) {
  const boxW = 950;
  const boxH = 550;
  const x1 = (W - boxW) / 2;
  const y1 = (H - boxH) / 2;

  cx.save();
  cx.globalAlpha = 0.9;
  cx.fillStyle = 'rgb(15,15,15)';
  cx.fillRect(x1, y1, boxW, boxH);
  cx.globalAlpha = 1.0;
  cx.strokeStyle = '#fff';
  cx.lineWidth = 4;
  cx.strokeRect(x1, y1, boxW, boxH);

  const lines = [
    "--- HOW TO PLAY ---",
    "1. Index Finger: DRAW",
    "2. PINCH to move your art",
    "3. Open your PALM: STOP drawing",
    "4. Touch 'CLEAR': RESET",
    "",
    "SHOW YOUR HANDS TO START!"
  ];

  cx.font = 'bold 36px Helvetica, Arial, sans-serif';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';

  for (let i = 0; i < lines.length; i++) {
    cx.fillStyle = (i === 6) ? 'rgb(255,255,0)' : '#fff';
    cx.fillText(lines[i], x1 + boxW / 2, y1 + 80 + i * 65);
  }

  cx.restore();
}

function drawDistanceWarning(cx) {
  cx.save();
  cx.globalAlpha = 0.7;
  cx.fillStyle = 'rgb(180,0,0)';
  cx.fillRect(0, 0, W, 100);
  cx.globalAlpha = 1.0;
  cx.fillStyle = '#fff';
  cx.font = 'bold 48px Helvetica, Arial, sans-serif';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText('!!! TOO CLOSE !!!', W / 2, 50);
  cx.restore();
}

const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

function drawHandSkeleton(cx, landmarks) {
  cx.strokeStyle = SKELETON_COLOR;
  cx.fillStyle = SKELETON_COLOR;
  cx.lineWidth = 2;

  for (const [a, b] of HAND_CONNECTIONS) {
    const p1 = landmarks[a];
    const p2 = landmarks[b];
    cx.beginPath();
    cx.moveTo(p1.x * W, p1.y * H);
    cx.lineTo(p2.x * W, p2.y * H);
    cx.stroke();
  }

  for (const lm of landmarks) {
    cx.beginPath();
    cx.arc(lm.x * W, lm.y * H, 3, 0, Math.PI * 2);
    cx.fill();
  }
}

function processResults(results) {
  clearCanvas(glowCanvas);
  clearCanvas(coreCanvas);
  clearCanvas(sparkGlowCanvas);
  clearCanvas(sparkCoreCanvas);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  tooClose = false;

  if (selectedShapeIdx !== null && !shapes[selectedShapeIdx]) {
    selectedShapeIdx = null;
    prevPinchPos = null;
  }

  const hasHands = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;

  if (hasHands) {
    guideVisible = false;
    guideStartTime = null;

    for (const landmarks of results.multiHandLandmarks) {
      const wrist = landmarks[0];
      const indexMcpRef = landmarks[5];

      const handSize = dist(
        [wrist.x * W, wrist.y * H],
        [indexMcpRef.x * W, indexMcpRef.y * H]
      );

      if (handSize > TOO_CLOSE_THRESHOLD) {
        tooClose = true;
        continue;
      }

      drawHandSkeleton(ctx, landmarks);

      const thumbTip = landmarks[4];
      const indexTip = landmarks[8];
      const indexMcp = landmarks[6];
      const middleMcp = landmarks[10];
      const ringMcp = landmarks[14];
      const pinkyMcp = landmarks[18];

      const tx = thumbTip.x * W;
      const ty = thumbTip.y * H;
      const ix = indexTip.x * W;
      const iy = indexTip.y * H;

      if (
        ix >= CLEAR_BTN.x1 && ix <= CLEAR_BTN.x2 &&
        iy >= CLEAR_BTN.y1 && iy <= CLEAR_BTN.y2
      ) {
        resetDrawingState();
        continue;
      }

      const pinchDistance = dist([tx, ty], [ix, iy]);

      if (pinchDistance < 45) {
        finalizeCurrentShape();

        if (selectedShapeIdx === null) {
          for (let i = 0; i < shapes.length; i++) {
            const shape = shapes[i];
            let hit = false;

            for (const p of shape) {
              if (dist([ix, iy], p) < 50) {
                hit = true;
                break;
              }
            }

            if (hit) {
              selectedShapeIdx = i;
              break;
            }
          }
        }

        if (
          selectedShapeIdx !== null &&
          prevPinchPos &&
          shapes[selectedShapeIdx]
        ) {
          const dx = ix - prevPinchPos[0];
          const dy = iy - prevPinchPos[1];

          shapes[selectedShapeIdx] = shapes[selectedShapeIdx].map(
            p => [p[0] + dx, p[1] + dy]
          );
        }

        prevPinchPos = [ix, iy];
      } else {
        selectedShapeIdx = null;
        prevPinchPos = null;

        const indexUp = iy < indexMcp.y * H;
        const othersDown =
          landmarks[12].y > middleMcp.y &&
          landmarks[16].y > ringMcp.y &&
          landmarks[20].y > pinkyMcp.y;

        if (indexUp && othersDown) {
          addPointToCurrentShape(ix, iy);
        } else {
          finalizeCurrentShape();
        }
      }
    }
  } else {
    if (!guideVisible) {
      guideVisible = true;
      guideStartTime = performance.now() / 1000;
    }

    if (guideStartTime !== null) {
      if (performance.now() / 1000 - guideStartTime > 5.0) {
        resetDrawingState();
      }
    }
  }

  drawUiAndArt();
}

function drawUiAndArt() {
  ctx.fillStyle = 'rgb(50,50,50)';
  ctx.fillRect(
    CLEAR_BTN.x1,
    CLEAR_BTN.y1,
    CLEAR_BTN.x2 - CLEAR_BTN.x1,
    CLEAR_BTN.y2 - CLEAR_BTN.y1
  );

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px Helvetica, Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('CLEAR', CLEAR_BTN.x1 + 18, CLEAR_BTN.y1 + 42);

  gctx.lineCap = 'round';
  gctx.lineJoin = 'round';
  cctx.lineCap = 'round';
  cctx.lineJoin = 'round';

  for (let i = 0; i < shapes.length; i++) {
    drawShape(shapes[i], i === selectedShapeIdx ? GRAB_GLOW_COLOR : DRAW_GLOW_COLOR);
  }

  if (currentShape.length >= 2) {
    drawShape(currentShape, DRAW_GLOW_COLOR);
  }

  allSparks = allSparks.filter(s => s.life > 0);

  for (const s of allSparks) {
    s.update();
    s.drawGlow(sgctx);
    s.drawCore(scctx);
  }

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  ctx.filter = 'blur(8px)';
  ctx.drawImage(sparkGlowCanvas, 0, 0);
  ctx.drawImage(sparkGlowCanvas, 0, 0);

  ctx.filter = 'blur(14px)';
  ctx.drawImage(glowCanvas, 0, 0);
  ctx.drawImage(glowCanvas, 0, 0);

  ctx.filter = 'none';
  ctx.drawImage(sparkCoreCanvas, 0, 0);
  ctx.drawImage(coreCanvas, 0, 0);

  ctx.restore();

  if (guideVisible) {
    drawGuideOverlay(ctx);
  } else if (tooClose) {
    drawDistanceWarning(ctx);
  }
}

function drawShape(shape, glowColor) {
  if (shape.length < 2) return;

  gctx.strokeStyle = glowColor;
  gctx.lineWidth = 12;

  cctx.strokeStyle = '#fff';
  cctx.lineWidth = 4;

  gctx.beginPath();
  cctx.beginPath();

  gctx.moveTo(shape[0][0], shape[0][1]);
  cctx.moveTo(shape[0][0], shape[0][1]);

  for (let j = 1; j < shape.length; j++) {
    gctx.lineTo(shape[j][0], shape[j][1]);
    cctx.lineTo(shape[j][0], shape[j][1]);
  }

  gctx.stroke();
  cctx.stroke();
}

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.8
});

hands.onResults(results => {
  if (loading.style.display !== 'none') {
    loading.style.display = 'none';
  }

  try {
    processResults(results);
  } catch (err) {
    console.error('processResults error:', err);
    selectedShapeIdx = null;
    prevPinchPos = null;
  }
});

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 1280, height: 720, facingMode: 'user' },
      audio: false
    });

    video.srcObject = stream;
    await new Promise(resolve => video.onloadedmetadata = resolve);
    await video.play();

    const flipCanvas = document.createElement('canvas');
    flipCanvas.width = W;
    flipCanvas.height = H;
    const fctx = flipCanvas.getContext('2d');

    async function loop() {
      requestAnimationFrame(loop);

      if (isProcessingFrame) return;
      if (video.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) return;

      isProcessingFrame = true;

      try {
        fctx.save();
        fctx.clearRect(0, 0, W, H);
        fctx.translate(W, 0);
        fctx.scale(-1, 1);
        fctx.drawImage(video, 0, 0, W, H);
        fctx.restore();

        await hands.send({ image: flipCanvas });
      } catch (err) {
        console.error('Frame loop error:', err);
        selectedShapeIdx = null;
        prevPinchPos = null;
      } finally {
        isProcessingFrame = false;
      }
    }

    loop();
  } catch (err) {
    loading.innerHTML =
      'Camera access failed.<br>Please allow camera permission and reload.';
    console.error(err);
  }
}

startCamera();
</script>
</body>
</html>
